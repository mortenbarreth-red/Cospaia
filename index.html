<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cospaia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --line-width: 2px;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow-x: hidden;
  }

  body {
    font-family: 'Inter', sans-serif;
    position: relative;
    min-height: 100vh;
    background: #fff;
  }

  /* Diagonal split bakgrunn, svart oppe til venstre / hvit nede til høyre.
     Diagonalen går nøyaktig fra øvre venstre hjørne til nedre høyre hjørne
     (clip-path: 0 0, 100% 0, 0 100%), uavhengig av viewportens
     aspect ratio. Det deler kanvasen i to like store trekanter,
     altså garantert 50/50-areal på alle skjermstørrelser. */
  .flag-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: #fff;
    overflow: hidden;
  }

  .flag-bg::before {
    content: "";
    position: absolute;
    inset: 0;
    background: #0a0a0a;
    clip-path: polygon(0 0, 100% 0, 0 100%);
  }

  .flag-bg::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(120,120,120,0.35);
    clip-path: polygon(
      0 0, 100% 0, 0 100%, 0 calc(100% - var(--line-width)),
      calc(100% - var(--line-width)) 0, 0 0
    );
  }

  main {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    mix-blend-mode: difference;
  }

  .wordmark {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: clamp(3.5rem, 12vw, 8rem);
    letter-spacing: 0.04em;
    color: #fff;
    line-height: 1;
  }

  .motto {
    margin-top: 1.1rem;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(0.95rem, 1.6vw, 1.25rem);
    letter-spacing: 0.06em;
    color: #fff;
  }

  .tagline {
    margin-top: 2.5rem;
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: clamp(0.8rem, 1vw, 0.95rem);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #fff;
  }

  footer {
    position: fixed;
    bottom: 1.5rem;
    right: 1.75rem;
    z-index: 1;
    text-align: right;
    font-family: 'Inter', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    color: #0a0a0a;
    pointer-events: none;
  }

  @media (max-width: 480px) {
    .tagline { letter-spacing: 0.12em; }
  }
</style>
</head>
<body>

  <div class="flag-bg" aria-hidden="true"></div>

  <main>
    <h1 class="wordmark">Cospaia</h1>
    <p class="motto">Perpetua et firma libertas</p>
    <p class="tagline">Kommer snart</p>
  </main>

  <footer>&copy; 2026 Cospaia</footer>

</body>
</html>
